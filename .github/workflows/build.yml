name: Build and Push

on:
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      container_name: ${{ steps.meta.outputs.container_name }}
      environment: "production" 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag and container name
        id: meta
        run: |
          DATE=$(date +%m%d%H%M)
          SHA=$(echo ${{ github.sha }} | cut -c1-5)
          TAG="main-${DATE}-${SHA}"
          CONTAINER_NAME="vending-machine-app"
          
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "container_name=${CONTAINER_NAME}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKER_REPO }}:latest

  call-deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ needs.build.outputs.environment }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      container_name: ${{ needs.build.outputs.container_name }}
    secrets:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
